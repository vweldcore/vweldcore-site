<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>VWELDCORE Automation Products</title>

<style>

body{
background:#070b14;
color:#ffffff;
font-family:Arial,sans-serif;
margin:0;
padding:0;
line-height:1.7;
}

.container{
max-width:1100px;
margin:auto;
padding:25px;
}

.hero{
padding:70px 20px;
text-align:center;
}

.hero h1{
font-size:48px;
margin-bottom:20px;
}

.hero p{
font-size:20px;
color:#bbbbbb;
max-width:800px;
margin:auto;
}

.cta{
display:inline-block;
margin-top:30px;
padding:16px 28px;
background:#00c853;
color:white;
text-decoration:none;
border-radius:10px;
font-weight:bold;
font-size:18px;
}

.grid{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(300px,1fr));
gap:25px;
margin-top:50px;
}

.card{
background:#111827;
padding:25px;
border-radius:14px;
border:1px solid #1f2937;
}

.card h2{
margin-top:0;
font-size:28px;
}

.price{
font-size:34px;
color:#00ff99;
margin:15px 0;
font-weight:bold;
}

ul{
padding-left:20px;
}

.buy{
display:inline-block;
margin-top:20px;
padding:14px 20px;
background:#2962ff;
color:white;
text-decoration:none;
border-radius:8px;
font-weight:bold;
}

.section{
margin-top:80px;
}

.proof{
background:#0f172a;
padding:30px;
border-radius:14px;
margin-top:25px;
}

.footer{
margin-top:80px;
padding:30px;
text-align:center;
color:#888;
}

.wallet{
word-break:break-all;
background:#000;
padding:14px;
border-radius:10px;
margin-top:15px;
color:#00ff99;
}


.proof-section {
  margin-top: 80px;
}

.proof-section h2 {
  font-size: 38px;
  margin-bottom: 30px;
}

</section>


<section class="proof-section">

<h2>Operational Proof</h2>

<p>Live system verification across runtime execution, deployment pipeline, and order processing.</p>

<div class="proof-grid">

<div class="proof-card">
<img src="../assets/proof/runtime-proof.jpg" alt="Runtime Proof">
<h3>Runtime Execution (Termux Engine)</h3>
<p style="color:#9ca3af;font-size:13px;">
Executed inside Android Termux runtime environment
</p>
</div>

<div class="proof-card">
<img src="../assets/proof/github-proof.jpg" alt="GitHub Proof">
<h3>GitHub Deployment Verification</h3>
<p style="color:#9ca3af;font-size:13px;">
Verified GitHub deployment pipeline
</p>
</div>

<div class="proof-card">
<img src="../assets/proof/order-page-proof.jpg" alt="Order Proof">
<h3>Order System Live Status</h3>
<p style="color:#9ca3af;font-size:13px;">
Telegram-based order routing system
</p>
</div>

</div>
</section>

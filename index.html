<!DOCTYPE html>
<html>
<head>
    <title>VWELDCORE</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">

    <style>
        body{
            font-family: Arial;
            background:#111;
            color:white;
            padding:20px;
        }

        h1{
            color:#00ff99;
        }

        input, textarea, button{
            width:100%;
            padding:12px;
            margin-top:10px;
            border:none;
            border-radius:5px;
        }

        button{
            background:#00ff99;
            color:black;
            font-weight:bold;
        }
    </style>
</head>

<body>

<h1>VWELDCORE</h1>

<p>
Cold Room Installation • Welding Fabrication • Industrial Solutions
</p>

<form id="leadForm">

<input type="text" id="name" placeholder="Your Name" required>

<input type="email" id="email" placeholder="Your Email" required>

<input type="text" id="service" placeholder="Service Needed" required>

<textarea id="message" placeholder="Describe your request"></textarea>

<button type="submit">Submit Request</button>

</form>

<p id="status"></p>

<script>

document.getElementById("leadForm").addEventListener("submit", async function(e){

    e.preventDefault();

    const data = {
        name: document.getElementById("name").value,
        email: document.getElementById("email").value,
        service: document.getElementById("service").value,
        message: document.getElementById("message").value
    };

    const response = await fetch(
        "https://vweldcore-webhook.onrender.com",
        {
            method: "POST",
            headers: {
                "Content-Type":"application/json"
            },
            body: JSON.stringify(data)
        }
    );

    const result = await response.json();

    document.getElementById("status").innerText =
        "Request Sent Successfully";
});
</script>

</body>
</html>
